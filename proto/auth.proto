syntax = "proto3";

package auth;

option go_package = "./pb";

service AuthService {
  rpc LoginWithGoogle (GoogleLoginRequest) returns (AuthResponse);
}

message GoogleLoginRequest {
  string id_token = 1;
}

message AuthResponse {
  string access_token = 1;
  string user_id = 2;
  string email = 3;
  string username = 4;
  string role = 5;
}